<svg viewBox="0 0 960 590" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">
  <title>Chatbot retrieval pipeline and stack</title>
  <desc>Question goes to Claude, which decides whether to search. On search, Vectorize and D1 FTS5 run in parallel, are fused with RRF, reranked by Haiku, and fed back for a grounded streamed answer. Without search, Claude answers directly. Stack: bge-base-en-v1.5 embeddings, Vectorize vector DB, D1 FTS5 keyword search, Claude Haiku/Sonnet for generation and rerank, D1 and Langfuse for tracing.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a8a86"/>
    </marker>
  </defs>

  <g transform="translate(160,0)">
    <!-- connectors -->
    <g stroke="#8a8a86" stroke-width="1.5" fill="none">
      <line x1="320" y1="60" x2="320" y2="88" marker-end="url(#arrow)"/>
      <line x1="320" y1="140" x2="320" y2="160" />
      <line x1="320" y1="160" x2="170" y2="178" marker-end="url(#arrow)"/>
      <line x1="320" y1="160" x2="470" y2="178" marker-end="url(#arrow)"/>
      <line x1="170" y1="230" x2="220" y2="268" marker-end="url(#arrow)"/>
      <line x1="470" y1="230" x2="420" y2="268" marker-end="url(#arrow)"/>
      <line x1="320" y1="320" x2="320" y2="358" marker-end="url(#arrow)"/>
      <path d="M 490,115 L 600,115 L 600,385 L 472,385" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    </g>
    <text x="600" y="105" text-anchor="end" font-size="11" fill="#8a8a86">no search</text>

    <!-- question -->
    <rect x="250" y="20" width="140" height="40" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
    <text x="320" y="45" text-anchor="middle" font-size="13" fill="#2C2C2A">question</text>

    <!-- decision -->
    <rect x="150" y="90" width="340" height="50" rx="8" fill="#EEEDFE" stroke="#534AB7"/>
    <text x="320" y="112" text-anchor="middle" font-size="13" fill="#26215C">Claude decides:</text>
    <text x="320" y="129" text-anchor="middle" font-size="13" fill="#26215C">search or answer directly</text>

    <!-- vectorize -->
    <rect x="95" y="180" width="150" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
    <text x="170" y="200" text-anchor="middle" font-size="13" fill="#04342C">Vectorize</text>
    <text x="170" y="217" text-anchor="middle" font-size="11" fill="#04342C">semantic</text>

    <!-- keyword -->
    <rect x="395" y="180" width="150" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56"/>
    <text x="470" y="200" text-anchor="middle" font-size="13" fill="#04342C">D1 FTS5</text>
    <text x="470" y="217" text-anchor="middle" font-size="11" fill="#04342C">keyword</text>

    <!-- fuse/rerank -->
    <rect x="130" y="270" width="380" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B"/>
    <text x="320" y="292" text-anchor="middle" font-size="13" fill="#412402">RRF fuse &#8594; Haiku rerank</text>
    <text x="320" y="309" text-anchor="middle" font-size="11" fill="#412402">top 6 chunks</text>

    <!-- answer -->
    <rect x="170" y="360" width="300" height="50" rx="8" fill="#FAECE7" stroke="#993C1D"/>
    <text x="320" y="382" text-anchor="middle" font-size="13" fill="#4A1B0C">grounded answer</text>
    <text x="320" y="399" text-anchor="middle" font-size="11" fill="#4A1B0C">streamed</text>
  </g>

  <!-- ================= stack cards ================= -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif">

    <!-- card 1: Embeddings -->
    <g transform="translate(20,440)">
      <rect width="174" height="130" rx="14" fill="#F5F4EF"/>
      <g transform="translate(16,14)" stroke="#8a8a86" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="4" cy="4" r="2.2"/>
        <circle cx="16" cy="4" r="2.2"/>
        <circle cx="10" cy="18" r="2.2"/>
        <line x1="6" y1="5.5" x2="8.5" y2="16"/>
        <line x1="14" y1="5.5" x2="11.5" y2="16"/>
        <line x1="6.2" y1="4" x2="13.8" y2="4"/>
      </g>
      <text x="16" y="60" font-size="11.5" fill="#8a8a86">Embeddings</text>
      <text x="16" y="80" font-size="13.5" font-weight="600" fill="#2C2C2A">bge-base-en-v1.5</text>
      <text x="16" y="97" font-size="10" fill="#9a9a94">768-dim</text>
      <text x="16" y="111" font-size="10" fill="#9a9a94">Workers AI</text>
    </g>

    <!-- card 2: Vector DB -->
    <g transform="translate(206,440)">
      <rect width="174" height="130" rx="14" fill="#F5F4EF"/>
      <g transform="translate(16,14)" stroke="#8a8a86" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="10" cy="4" rx="8" ry="3"/>
        <path d="M2,4 V16 C2,17.7 5.6,19 10,19 C14.4,19 18,17.7 18,16 V4"/>
        <path d="M2,10 C2,11.7 5.6,13 10,13 C14.4,13 18,11.7 18,10"/>
      </g>
      <text x="16" y="60" font-size="11.5" fill="#8a8a86">Vector DB</text>
      <text x="16" y="80" font-size="13.5" font-weight="600" fill="#2C2C2A">Vectorize</text>
      <text x="16" y="97" font-size="10" fill="#9a9a94">cosine</text>
      <text x="16" y="111" font-size="10" fill="#9a9a94">similarity</text>
    </g>

    <!-- card 3: Keyword search -->
    <g transform="translate(392,440)">
      <rect width="174" height="130" rx="14" fill="#F5F4EF"/>
      <g transform="translate(16,12)" stroke="#8a8a86" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4,2 H13 L18,7 V21 H4 Z"/>
        <path d="M13,2 V7 H18"/>
        <circle cx="10" cy="13" r="3"/>
        <line x1="12.3" y1="15.3" x2="15" y2="18"/>
      </g>
      <text x="16" y="60" font-size="11.5" fill="#8a8a86">Keyword search</text>
      <text x="16" y="80" font-size="13.5" font-weight="600" fill="#2C2C2A">D1 + FTS5</text>
      <text x="16" y="97" font-size="10" fill="#9a9a94">BM25</text>
      <text x="16" y="111" font-size="10" fill="#9a9a94">ranking</text>
    </g>

    <!-- card 4: Generation / rerank -->
    <g transform="translate(578,440)">
      <rect width="174" height="130" rx="14" fill="#F5F4EF"/>
      <g transform="translate(16,14)" fill="#8a8a86">
        <path d="M10,0 L12,7 L19,9 L12,11 L10,18 L8,11 L1,9 L8,7 Z"/>
        <path d="M18,12 L19,15 L22,16 L19,17 L18,20 L17,17 L14,16 L17,15 Z"/>
      </g>
      <text x="16" y="60" font-size="11.5" fill="#8a8a86">Generation / rerank</text>
      <text x="16" y="80" font-size="13.5" font-weight="600" fill="#2C2C2A">Claude Haiku</text>
      <text x="16" y="97" font-size="10" fill="#9a9a94">/ Sonnet</text>
      <text x="16" y="111" font-size="10" fill="#9a9a94">tool-use decision</text>
    </g>

    <!-- card 5: Tracing -->
    <g transform="translate(764,440)">
      <rect width="174" height="130" rx="14" fill="#F5F4EF"/>
      <g transform="translate(16,16)" stroke="#8a8a86" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <line x1="2" y1="20" x2="20" y2="20"/>
        <rect x="4" y="13" width="3.5" height="7"/>
        <rect x="10.3" y="8" width="3.5" height="12"/>
        <rect x="16.6" y="3" width="3.5" height="17"/>
      </g>
      <text x="16" y="60" font-size="11.5" fill="#8a8a86">Tracing</text>
      <text x="16" y="80" font-size="13.5" font-weight="600" fill="#2C2C2A">D1 + Langfuse</text>
      <text x="16" y="97" font-size="10" fill="#9a9a94">cost, latency,</text>
      <text x="16" y="111" font-size="10" fill="#9a9a94">RAG quality</text>
    </g>

  </g>
</svg>
