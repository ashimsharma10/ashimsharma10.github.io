<svg width="100%" viewBox="0 0 1080 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="Three communication patterns in ML: CPU to GPU over PCIe, GPU to GPU over NVLink/NVSwitch with all-reduce, and TPU to TPU over an ICI mesh">
  <defs>
    <marker id="cmA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#64748b" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1080" height="380" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="28" y="38" font-size="20" font-weight="700" fill="#0f172a">How the chips talk to each other</text>
  <text x="28" y="60" font-size="13" fill="#64748b">As you add chips, the links between them become the bottleneck. Each tier is slower than the last.</text>

  <!-- ============ CPU <-> GPU ============ -->
  <rect x="16" y="80" width="338" height="280" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="185" y="108" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">CPU ↔ GPU</text>
  <text x="185" y="128" font-size="12" fill="#64748b" text-anchor="middle">host feeds the device</text>

  <rect x="50" y="170" width="96" height="74" rx="10" fill="#e6f1fb" stroke="#2563eb" stroke-width="1.8"/>
  <text x="98" y="205" font-size="15" font-weight="700" fill="#0c447c" text-anchor="middle">CPU</text>
  <text x="98" y="224" font-size="10.5" fill="#2563eb" text-anchor="middle">+ system RAM</text>

  <rect x="224" y="170" width="96" height="74" rx="10" fill="#e1f5ee" stroke="#16a34a" stroke-width="1.8"/>
  <text x="272" y="205" font-size="15" font-weight="700" fill="#085041" text-anchor="middle">GPU</text>
  <text x="272" y="224" font-size="10.5" fill="#16a34a" text-anchor="middle">+ HBM</text>

  <line x1="146" y1="190" x2="224" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#cmA)"/>
  <line x1="224" y1="224" x2="146" y2="224" stroke="#cbd5e1" stroke-width="2" marker-end="url(#cmA)"/>
  <text x="185" y="160" font-size="11" font-weight="700" fill="#475569" text-anchor="middle">PCIe (the slow link)</text>
  <text x="185" y="206" font-size="10" fill="#475569" text-anchor="middle">batches →</text>
  <circle r="5" cy="190" fill="#3b82f6"><animate attributeName="cx" from="150" to="220" dur="1.8s" repeatCount="indefinite"/></circle>

  <text x="185" y="300" font-size="11.5" fill="#475569" text-anchor="middle">Every step: input batch crosses to</text>
  <text x="185" y="316" font-size="11.5" fill="#475569" text-anchor="middle">the GPU. Overlap it or the GPU waits.</text>
  <text x="185" y="338" font-size="11" font-style="italic" fill="#94a3b8" text-anchor="middle">pinned memory · prefetch · NVLink-C2C</text>

  <!-- ============ GPU <-> GPU ============ -->
  <rect x="371" y="80" width="338" height="280" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="540" y="108" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">GPU ↔ GPU</text>
  <text x="540" y="128" font-size="12" fill="#64748b" text-anchor="middle">fast links inside a server</text>

  <!-- 4 GPUs -->
  <g>
    <rect x="406" y="150" width="56" height="34" rx="7" fill="#e1f5ee" stroke="#16a34a"/><text x="434" y="172" font-size="11" font-weight="700" fill="#085041" text-anchor="middle">GPU</text>
    <rect x="482" y="150" width="56" height="34" rx="7" fill="#e1f5ee" stroke="#16a34a"/><text x="510" y="172" font-size="11" font-weight="700" fill="#085041" text-anchor="middle">GPU</text>
    <rect x="558" y="150" width="56" height="34" rx="7" fill="#e1f5ee" stroke="#16a34a"/><text x="586" y="172" font-size="11" font-weight="700" fill="#085041" text-anchor="middle">GPU</text>
    <rect x="634" y="150" width="56" height="34" rx="7" fill="#e1f5ee" stroke="#16a34a"/><text x="662" y="172" font-size="11" font-weight="700" fill="#085041" text-anchor="middle">GPU</text>
  </g>
  <!-- NVSwitch bar -->
  <rect x="406" y="232" width="284" height="34" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.6"/>
  <text x="548" y="254" font-size="12.5" font-weight="700" fill="#92400e" text-anchor="middle">NVLink / NVSwitch</text>
  <!-- links GPU->switch -->
  <g stroke="#94a3b8" stroke-width="2">
    <line x1="434" y1="184" x2="434" y2="232"/>
    <line x1="510" y1="184" x2="510" y2="232"/>
    <line x1="586" y1="184" x2="586" y2="232"/>
    <line x1="662" y1="184" x2="662" y2="232"/>
  </g>
  <!-- animated all-reduce dots -->
  <circle r="5" cx="434" fill="#16a34a"><animate attributeName="cy" values="186;230;186" dur="2s" repeatCount="indefinite" begin="0s"/></circle>
  <circle r="5" cx="510" fill="#16a34a"><animate attributeName="cy" values="186;230;186" dur="2s" repeatCount="indefinite" begin="0.3s"/></circle>
  <circle r="5" cx="586" fill="#16a34a"><animate attributeName="cy" values="186;230;186" dur="2s" repeatCount="indefinite" begin="0.15s"/></circle>
  <circle r="5" cx="662" fill="#16a34a"><animate attributeName="cy" values="186;230;186" dur="2s" repeatCount="indefinite" begin="0.45s"/></circle>

  <text x="540" y="300" font-size="11.5" fill="#475569" text-anchor="middle">All GPUs sum their gradients together</text>
  <text x="540" y="316" font-size="11.5" fill="#475569" text-anchor="middle">("all-reduce") after every step.</text>
  <text x="540" y="338" font-size="11" font-style="italic" fill="#94a3b8" text-anchor="middle">NCCL · across servers: InfiniBand / Ethernet</text>

  <!-- ============ TPU <-> TPU ============ -->
  <rect x="726" y="80" width="338" height="280" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="895" y="108" font-size="16" font-weight="700" fill="#0f172a" text-anchor="middle">TPU ↔ TPU</text>
  <text x="895" y="128" font-size="12" fill="#64748b" text-anchor="middle">direct mesh, no host in the loop</text>

  <!-- 3x3 torus mesh; cols 815,880,945 rows 160,210,260 -->
  <g stroke="#a78bfa" stroke-width="2">
    <!-- horizontal links -->
    <line x1="833" y1="172" x2="880" y2="172"/><line x1="898" y1="172" x2="945" y2="172"/>
    <line x1="833" y1="222" x2="880" y2="222"/><line x1="898" y1="222" x2="945" y2="222"/>
    <line x1="833" y1="272" x2="880" y2="272"/><line x1="898" y1="272" x2="945" y2="272"/>
    <!-- vertical links -->
    <line x1="815" y1="190" x2="815" y2="210"/><line x1="815" y1="240" x2="815" y2="260"/>
    <line x1="880" y1="190" x2="880" y2="210"/><line x1="880" y1="240" x2="880" y2="260"/>
    <line x1="945" y1="190" x2="945" y2="210"/><line x1="945" y1="240" x2="945" y2="260"/>
  </g>
  <!-- torus wrap hints (dashed) -->
  <g stroke="#c4b5fd" stroke-width="1.6" stroke-dasharray="4 4" fill="none">
    <path d="M963 172 q22 0 22 50 q0 50 -22 50"/>
    <path d="M797 260 q-18 0 -18 -44 q0 -44 18 -44"/>
  </g>
  <!-- nodes -->
  <g>
    <rect x="797" y="160" width="36" height="24" rx="5" fill="#eef2ff" stroke="#7c3aed"/>
    <rect x="862" y="160" width="36" height="24" rx="5" fill="#eef2ff" stroke="#7c3aed"/>
    <rect x="927" y="160" width="36" height="24" rx="5" fill="#eef2ff" stroke="#7c3aed"/>
    <rect x="797" y="210" width="36" height="24" rx="5" fill="#eef2ff" stroke="#7c3aed"/>
    <rect x="862" y="210" width="36" height="24" rx="5" fill="#eef2ff" stroke="#7c3aed"/>
    <rect x="927" y="210" width="36" height="24" rx="5" fill="#eef2ff" stroke="#7c3aed"/>
    <rect x="797" y="260" width="36" height="24" rx="5" fill="#eef2ff" stroke="#7c3aed"/>
    <rect x="862" y="260" width="36" height="24" rx="5" fill="#eef2ff" stroke="#7c3aed"/>
    <rect x="927" y="260" width="36" height="24" rx="5" fill="#eef2ff" stroke="#7c3aed"/>
  </g>
  <!-- animated dot traveling a row -->
  <circle r="5" cy="172" fill="#7c3aed"><animate attributeName="cx" values="815;880;945;815" dur="2.4s" repeatCount="indefinite"/></circle>
  <text x="895" y="306" font-size="11.5" fill="#475569" text-anchor="middle">Each chip wired straight to its neighbors</text>
  <text x="895" y="322" font-size="11.5" fill="#475569" text-anchor="middle">(a torus), scaling to whole "pods".</text>
  <text x="895" y="342" font-size="11" font-style="italic" fill="#94a3b8" text-anchor="middle">ICI links · collectives run on-chip via XLA</text>
</svg>
