<svg width="100%" viewBox="0 0 760 330" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="Tensor core operation: multiply two matrix tiles and add a third in a single step, D equals A times B plus C">
  <defs>
    <pattern id="tile4" width="22.5" height="22.5" patternUnits="userSpaceOnUse">
      <rect width="22.5" height="22.5" fill="#dcfce7"/>
      <rect x="1.5" y="1.5" width="19.5" height="19.5" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.6"/>
    </pattern>
    <pattern id="tile4b" width="22.5" height="22.5" patternUnits="userSpaceOnUse">
      <rect width="22.5" height="22.5" fill="#fef3c7"/>
      <rect x="1.5" y="1.5" width="19.5" height="19.5" fill="#fde68a" stroke="#d97706" stroke-width="0.6"/>
    </pattern>
    <pattern id="tile4c" width="22.5" height="22.5" patternUnits="userSpaceOnUse">
      <rect width="22.5" height="22.5" fill="#ede9fe"/>
      <rect x="1.5" y="1.5" width="19.5" height="19.5" fill="#ddd6fe" stroke="#7c3aed" stroke-width="0.6"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="760" height="330" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="32" y="42" font-size="21" font-weight="700" fill="#0f172a">What a tensor core does in one step</text>
  <text x="32" y="66" font-size="14" fill="#64748b">A normal core multiplies two numbers. A tensor core multiplies two whole tiles at once.</text>

  <!-- A -->
  <rect x="48" y="110" width="90" height="90" rx="6" fill="url(#tile4)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="93" y="222" font-size="13" font-weight="700" fill="#166534" text-anchor="middle">A</text>
  <text x="93" y="240" font-size="11" fill="#64748b" text-anchor="middle">activations</text>

  <text x="160" y="162" font-size="30" font-weight="700" fill="#334155" text-anchor="middle">×</text>

  <!-- B -->
  <rect x="182" y="110" width="90" height="90" rx="6" fill="url(#tile4b)" stroke="#d97706" stroke-width="1.5"/>
  <text x="227" y="222" font-size="13" font-weight="700" fill="#92400e" text-anchor="middle">B</text>
  <text x="227" y="240" font-size="11" fill="#64748b" text-anchor="middle">weights</text>

  <text x="294" y="162" font-size="30" font-weight="700" fill="#334155" text-anchor="middle">+</text>

  <!-- C -->
  <rect x="316" y="110" width="90" height="90" rx="6" fill="url(#tile4c)" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="361" y="222" font-size="13" font-weight="700" fill="#5b21b6" text-anchor="middle">C</text>
  <text x="361" y="240" font-size="11" fill="#64748b" text-anchor="middle">running sum</text>

  <text x="428" y="162" font-size="30" font-weight="700" fill="#334155" text-anchor="middle">=</text>

  <!-- D -->
  <rect x="450" y="110" width="90" height="90" rx="6" fill="url(#tile4)" stroke="#16a34a" stroke-width="2.5"/>
  <text x="495" y="222" font-size="13" font-weight="700" fill="#166534" text-anchor="middle">D</text>
  <text x="495" y="240" font-size="11" fill="#64748b" text-anchor="middle">result</text>

  <!-- badge -->
  <rect x="578" y="120" width="150" height="86" rx="10" fill="#ecfdf5" stroke="#16a34a" stroke-width="1.5"/>
  <text x="653" y="148" font-size="13" font-weight="700" fill="#166534" text-anchor="middle">one operation</text>
  <text x="653" y="170" font-size="12" fill="#15803d" text-anchor="middle">= hundreds of</text>
  <text x="653" y="188" font-size="12" fill="#15803d" text-anchor="middle">multiply-adds</text>

  <text x="380" y="290" font-size="14" font-weight="700" fill="#0f172a" text-anchor="middle">D = A × B + C</text>
  <text x="380" y="312" font-size="12" font-style="italic" fill="#94a3b8" text-anchor="middle">This single instruction is why modern AI training is fast, matrix math is most of the work.</text>
</svg>
