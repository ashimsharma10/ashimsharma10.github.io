<svg width="100%" viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="TPU architecture: one large matrix unit (systolic array) with on-chip SRAM and HBM">
  <defs>
    <pattern id="macgrid" width="22" height="22" patternUnits="userSpaceOnUse">
      <rect width="22" height="22" fill="#dcfce7"/>
      <rect x="2" y="2" width="18" height="18" rx="2" fill="#bbf7d0" stroke="#22c55e" stroke-width="0.6"/>
      <circle cx="11" cy="11" r="2.4" fill="#15803d"/>
    </pattern>
    <marker id="tpuArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="470" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="32" y="44" font-size="22" font-weight="700" fill="#0f172a">TPU, one giant matrix engine</text>
  <text x="32" y="70" font-size="14" fill="#64748b">Almost the whole chip is one matrix-multiply unit. Best matmul per watt.</text>

  <!-- die -->
  <rect x="32" y="92" width="556" height="320" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="52" y="116" font-size="13" font-weight="600" fill="#475569">TPU die</text>

  <!-- MXU big block -->
  <rect x="56" y="132" width="288" height="256" rx="10" fill="url(#macgrid)" stroke="#16a34a" stroke-width="2"/>
  <rect x="56" y="132" width="288" height="30" rx="10" fill="#16a34a"/>
  <text x="200" y="152" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">MXU, systolic array</text>
  <text x="200" y="404" font-size="12" fill="#166534" text-anchor="middle">grid of multiply-accumulate (MAC) cells</text>

  <!-- On-chip SRAM -->
  <rect x="364" y="132" width="206" height="120" rx="10" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="467" y="186" font-size="15" font-weight="700" fill="#1e40af" text-anchor="middle">On-chip SRAM</text>
  <text x="467" y="208" font-size="12" fill="#2563eb" text-anchor="middle">(unified buffer)</text>

  <!-- Vector unit -->
  <rect x="364" y="262" width="206" height="62" rx="9" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="467" y="290" font-size="13" font-weight="700" fill="#166534" text-anchor="middle">Vector / activation unit</text>
  <text x="467" y="308" font-size="11" fill="#16a34a" text-anchor="middle">add, scale, activation funcs</text>

  <!-- small control -->
  <rect x="364" y="334" width="98" height="54" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="413" y="358" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">Control</text>
  <text x="413" y="374" font-size="10" fill="#b45309" text-anchor="middle">(tiny)</text>

  <!-- arrows MXU <-> SRAM -->
  <line x1="344" y1="200" x2="364" y2="200" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#tpuArrow)" marker-start="url(#tpuArrow)"/>

  <!-- HBM -->
  <rect x="612" y="170" width="120" height="160" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="672" y="244" font-size="15" font-weight="700" fill="#5b21b6" text-anchor="middle">HBM</text>
  <text x="672" y="264" font-size="11" fill="#6d28d9" text-anchor="middle">stacked memory</text>
  <line x1="570" y1="200" x2="612" y2="200" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#tpuArrow)" marker-start="url(#tpuArrow)"/>

  <!-- legend -->
  <g font-size="11" fill="#475569">
    <rect x="612" y="352" width="14" height="12" rx="3" fill="#bbf7d0" stroke="#16a34a"/>
    <text x="632" y="362">matrix unit</text>
    <rect x="612" y="372" width="14" height="12" rx="3" fill="#dbeafe" stroke="#2563eb"/>
    <text x="632" y="382">on-chip memory</text>
  </g>
</svg>
