<svg width="100%" viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="GPU to GPU all-reduce: GPUs arranged in a ring pass and sum gradient chunks until every GPU holds the identical summed result">
  <rect x="0" y="0" width="900" height="560" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="32" y="44" font-size="22" font-weight="700" fill="#0f172a">GPU ↔ GPU: all-reduce after every step</text>
  <text x="32" y="70" font-size="14" fill="#64748b">Each GPU sums its gradients with all the others, then everyone continues in sync.</text>

  <!-- ring path (data travels around it) -->
  <path d="M450,128 L650,208 L650,368 L450,448 L250,368 L250,208 Z" fill="none" stroke="#cbd5e1" stroke-width="2.5"/>

  <!-- center summary -->
  <rect x="356" y="252" width="188" height="72" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="1.6"/>
  <text x="450" y="282" font-size="14" font-weight="700" fill="#92400e" text-anchor="middle">all-reduce</text>
  <text x="450" y="302" font-size="11.5" fill="#b45309" text-anchor="middle">Σ gradients → every GPU</text>
  <text x="450" y="317" font-size="11.5" fill="#b45309" text-anchor="middle">ends up identical</text>

  <!-- moving chunks around the ring -->
  <circle r="8" fill="#16a34a"><animateMotion path="M450,128 L650,208 L650,368 L450,448 L250,368 L250,208 Z" dur="4.5s" repeatCount="indefinite" begin="0s"/></circle>
  <circle r="8" fill="#16a34a"><animateMotion path="M450,128 L650,208 L650,368 L450,448 L250,368 L250,208 Z" dur="4.5s" repeatCount="indefinite" begin="1.5s"/></circle>
  <circle r="8" fill="#16a34a"><animateMotion path="M450,128 L650,208 L650,368 L450,448 L250,368 L250,208 Z" dur="4.5s" repeatCount="indefinite" begin="3.0s"/></circle>

  <!-- GPU nodes on the 6 vertices -->
  <g>
    <rect x="402" y="100" width="96" height="56" rx="10" fill="#e1f5ee" stroke="#16a34a" stroke-width="1.8"/>
    <text x="450" y="125" font-size="14" font-weight="700" fill="#085041" text-anchor="middle">GPU 0</text>
    <text x="450" y="142" font-size="10.5" fill="#16a34a" text-anchor="middle">grads</text>

    <rect x="602" y="180" width="96" height="56" rx="10" fill="#e1f5ee" stroke="#16a34a" stroke-width="1.8"/>
    <text x="650" y="205" font-size="14" font-weight="700" fill="#085041" text-anchor="middle">GPU 1</text>
    <text x="650" y="222" font-size="10.5" fill="#16a34a" text-anchor="middle">grads</text>

    <rect x="602" y="340" width="96" height="56" rx="10" fill="#e1f5ee" stroke="#16a34a" stroke-width="1.8"/>
    <text x="650" y="365" font-size="14" font-weight="700" fill="#085041" text-anchor="middle">GPU 2</text>
    <text x="650" y="382" font-size="10.5" fill="#16a34a" text-anchor="middle">grads</text>

    <rect x="402" y="420" width="96" height="56" rx="10" fill="#e1f5ee" stroke="#16a34a" stroke-width="1.8"/>
    <text x="450" y="445" font-size="14" font-weight="700" fill="#085041" text-anchor="middle">GPU 3</text>
    <text x="450" y="462" font-size="10.5" fill="#16a34a" text-anchor="middle">grads</text>

    <rect x="202" y="340" width="96" height="56" rx="10" fill="#e1f5ee" stroke="#16a34a" stroke-width="1.8"/>
    <text x="250" y="365" font-size="14" font-weight="700" fill="#085041" text-anchor="middle">GPU 4</text>
    <text x="250" y="382" font-size="10.5" fill="#16a34a" text-anchor="middle">grads</text>

    <rect x="202" y="180" width="96" height="56" rx="10" fill="#e1f5ee" stroke="#16a34a" stroke-width="1.8"/>
    <text x="250" y="205" font-size="14" font-weight="700" fill="#085041" text-anchor="middle">GPU 5</text>
    <text x="250" y="222" font-size="10.5" fill="#16a34a" text-anchor="middle">grads</text>
  </g>

  <text x="450" y="208" font-size="12" font-style="italic" fill="#94a3b8" text-anchor="middle">↻ chunks passed around the ring</text>

  <!-- bottom note: link tiers -->
  <rect x="120" y="500" width="300" height="40" rx="10" fill="#eef6ff" stroke="#2563eb" stroke-width="1.4"/>
  <text x="270" y="518" font-size="12.5" font-weight="700" fill="#1e40af" text-anchor="middle">Inside a server</text>
  <text x="270" y="533" font-size="11" fill="#2563eb" text-anchor="middle">NVLink / NVSwitch, very fast</text>

  <rect x="480" y="500" width="300" height="40" rx="10" fill="#f1f5f9" stroke="#64748b" stroke-width="1.4"/>
  <text x="630" y="518" font-size="12.5" font-weight="700" fill="#334155" text-anchor="middle">Across servers</text>
  <text x="630" y="533" font-size="11" fill="#64748b" text-anchor="middle">InfiniBand / Ethernet, slower</text>
</svg>
