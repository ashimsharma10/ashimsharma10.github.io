<svg width="100%" viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="CPU architecture: a few large cores with big caches and control logic">
  <rect x="0" y="0" width="760" height="470" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="32" y="44" font-size="22" font-weight="700" fill="#0f172a">CPU, a few big, smart cores</text>
  <text x="32" y="70" font-size="14" fill="#64748b">Most of the chip is cache + control. Built to finish one task fast (low latency).</text>

  <!-- die outline -->
  <rect x="32" y="92" width="540" height="330" rx="12" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="52" y="116" font-size="13" font-weight="600" fill="#475569">CPU die</text>

  <!-- 4 cores -->
  <g>
    <!-- core template repeated -->
    <!-- Core 1 -->
    <rect x="52" y="128" width="240" height="116" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="64" y="148" font-size="13" font-weight="700" fill="#334155">Core</text>
    <rect x="64" y="156" width="96" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="112" y="177" font-size="12" font-weight="600" fill="#92400e" text-anchor="middle">Control</text>
    <rect x="166" y="156" width="52" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="192" y="177" font-size="12" font-weight="600" fill="#166534" text-anchor="middle">ALU</text>
    <rect x="222" y="156" width="56" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="250" y="177" font-size="12" font-weight="600" fill="#166534" text-anchor="middle">ALU</text>
    <rect x="64" y="198" width="214" height="34" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="171" y="219" font-size="12" font-weight="600" fill="#1e40af" text-anchor="middle">L1 / L2 cache</text>

    <!-- Core 2 -->
    <rect x="308" y="128" width="240" height="116" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="320" y="148" font-size="13" font-weight="700" fill="#334155">Core</text>
    <rect x="320" y="156" width="96" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="368" y="177" font-size="12" font-weight="600" fill="#92400e" text-anchor="middle">Control</text>
    <rect x="422" y="156" width="52" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="448" y="177" font-size="12" font-weight="600" fill="#166534" text-anchor="middle">ALU</text>
    <rect x="478" y="156" width="56" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="506" y="177" font-size="12" font-weight="600" fill="#166534" text-anchor="middle">ALU</text>
    <rect x="320" y="198" width="214" height="34" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="427" y="219" font-size="12" font-weight="600" fill="#1e40af" text-anchor="middle">L1 / L2 cache</text>

    <!-- Core 3 -->
    <rect x="52" y="256" width="240" height="116" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="64" y="276" font-size="13" font-weight="700" fill="#334155">Core</text>
    <rect x="64" y="284" width="96" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="112" y="305" font-size="12" font-weight="600" fill="#92400e" text-anchor="middle">Control</text>
    <rect x="166" y="284" width="52" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="192" y="305" font-size="12" font-weight="600" fill="#166534" text-anchor="middle">ALU</text>
    <rect x="222" y="284" width="56" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="250" y="305" font-size="12" font-weight="600" fill="#166534" text-anchor="middle">ALU</text>
    <rect x="64" y="326" width="214" height="34" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="171" y="347" font-size="12" font-weight="600" fill="#1e40af" text-anchor="middle">L1 / L2 cache</text>

    <!-- Core 4 -->
    <rect x="308" y="256" width="240" height="116" rx="9" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="320" y="276" font-size="13" font-weight="700" fill="#334155">Core</text>
    <rect x="320" y="284" width="96" height="34" rx="6" fill="#fef3c7" stroke="#d97706"/>
    <text x="368" y="305" font-size="12" font-weight="600" fill="#92400e" text-anchor="middle">Control</text>
    <rect x="422" y="284" width="52" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="448" y="305" font-size="12" font-weight="600" fill="#166534" text-anchor="middle">ALU</text>
    <rect x="478" y="284" width="56" height="34" rx="6" fill="#dcfce7" stroke="#16a34a"/>
    <text x="506" y="305" font-size="12" font-weight="600" fill="#166534" text-anchor="middle">ALU</text>
    <rect x="320" y="326" width="214" height="34" rx="6" fill="#dbeafe" stroke="#2563eb"/>
    <text x="427" y="347" font-size="12" font-weight="600" fill="#1e40af" text-anchor="middle">L1 / L2 cache</text>
  </g>

  <!-- big shared L3 -->
  <rect x="52" y="384" width="496" height="28" rx="7" fill="#bfdbfe" stroke="#2563eb"/>
  <text x="300" y="403" font-size="13" font-weight="700" fill="#1e3a8a" text-anchor="middle">Large shared L3 cache</text>

  <!-- DRAM on the right -->
  <rect x="612" y="210" width="116" height="92" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="670" y="250" font-size="14" font-weight="700" fill="#5b21b6" text-anchor="middle">DRAM</text>
  <text x="670" y="270" font-size="12" fill="#6d28d9" text-anchor="middle">(DDR memory)</text>
  <line x1="572" y1="256" x2="612" y2="256" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#cpuArrow)"/>

  <!-- legend -->
  <g font-size="12" fill="#475569">
    <rect x="612" y="330" width="16" height="14" rx="3" fill="#fef3c7" stroke="#d97706"/>
    <text x="634" y="342">Control</text>
    <rect x="612" y="352" width="16" height="14" rx="3" fill="#dcfce7" stroke="#16a34a"/>
    <text x="634" y="364">Compute (ALU)</text>
    <rect x="612" y="374" width="16" height="14" rx="3" fill="#dbeafe" stroke="#2563eb"/>
    <text x="634" y="386">Cache</text>
    <rect x="612" y="396" width="16" height="14" rx="3" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="634" y="408">Memory</text>
  </g>

  <defs>
    <marker id="cpuArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
