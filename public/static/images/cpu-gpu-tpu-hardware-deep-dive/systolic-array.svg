<svg width="100%" viewBox="0 0 760 470" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="Animated systolic array: weights stay fixed, activations stream in from the left, cells compute in a wavefront, and sums drop out the bottom to be collected">
  <defs>
    <marker id="syA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2563eb" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="470" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="28" y="40" font-size="20" font-weight="700" fill="#0f172a">How a matrix engine multiplies (animated)</text>
  <text x="28" y="63" font-size="13.5" fill="#64748b">Weights stay fixed · activations flow in from the left · sums build downward and drop out.</text>

  <!-- labels -->
  <text x="370" y="118" font-size="12.5" font-weight="700" fill="#d97706" text-anchor="middle">weights stay fixed in the grid ↓</text>
  <text x="150" y="150" font-size="12.5" font-weight="700" fill="#2563eb">activations</text>
  <text x="150" y="168" font-size="12.5" font-weight="700" fill="#2563eb">stream in →</text>

  <!-- 3x3 grid; origin x=250 y=150; cell 80 gap 10 -> cols 250,340,430 ; rows 150,240,330 -->
  <g>
    <!-- row 0 -->
    <rect x="250" y="150" width="80" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"><animate attributeName="fill" values="#dcfce7;#22c55e;#dcfce7" keyTimes="0;0.5;1" dur="3.4s" begin="0.9s" repeatCount="indefinite"/></rect>
    <rect x="340" y="150" width="80" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"><animate attributeName="fill" values="#dcfce7;#22c55e;#dcfce7" keyTimes="0;0.5;1" dur="3.4s" begin="1.6s" repeatCount="indefinite"/></rect>
    <rect x="430" y="150" width="80" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"><animate attributeName="fill" values="#dcfce7;#22c55e;#dcfce7" keyTimes="0;0.5;1" dur="3.4s" begin="2.3s" repeatCount="indefinite"/></rect>
    <!-- row 1 -->
    <rect x="250" y="240" width="80" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"><animate attributeName="fill" values="#dcfce7;#22c55e;#dcfce7" keyTimes="0;0.5;1" dur="3.4s" begin="1.2s" repeatCount="indefinite"/></rect>
    <rect x="340" y="240" width="80" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"><animate attributeName="fill" values="#dcfce7;#22c55e;#dcfce7" keyTimes="0;0.5;1" dur="3.4s" begin="1.9s" repeatCount="indefinite"/></rect>
    <rect x="430" y="240" width="80" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"><animate attributeName="fill" values="#dcfce7;#22c55e;#dcfce7" keyTimes="0;0.5;1" dur="3.4s" begin="2.6s" repeatCount="indefinite"/></rect>
    <!-- row 2 -->
    <rect x="250" y="330" width="80" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"><animate attributeName="fill" values="#dcfce7;#22c55e;#dcfce7" keyTimes="0;0.5;1" dur="3.4s" begin="1.5s" repeatCount="indefinite"/></rect>
    <rect x="340" y="330" width="80" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"><animate attributeName="fill" values="#dcfce7;#22c55e;#dcfce7" keyTimes="0;0.5;1" dur="3.4s" begin="2.2s" repeatCount="indefinite"/></rect>
    <rect x="430" y="330" width="80" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"><animate attributeName="fill" values="#dcfce7;#22c55e;#dcfce7" keyTimes="0;0.5;1" dur="3.4s" begin="2.9s" repeatCount="indefinite"/></rect>
  </g>

  <!-- weight chips (fixed) -->
  <g font-size="11" font-weight="700" fill="#92400e">
    <rect x="258" y="158" width="26" height="16" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="271" y="170" text-anchor="middle">w</text>
    <rect x="348" y="158" width="26" height="16" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="361" y="170" text-anchor="middle">w</text>
    <rect x="438" y="158" width="26" height="16" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="451" y="170" text-anchor="middle">w</text>
    <rect x="258" y="248" width="26" height="16" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="271" y="260" text-anchor="middle">w</text>
    <rect x="348" y="248" width="26" height="16" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="361" y="260" text-anchor="middle">w</text>
    <rect x="438" y="248" width="26" height="16" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="451" y="260" text-anchor="middle">w</text>
    <rect x="258" y="338" width="26" height="16" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="271" y="350" text-anchor="middle">w</text>
    <rect x="348" y="338" width="26" height="16" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="361" y="350" text-anchor="middle">w</text>
    <rect x="438" y="338" width="26" height="16" rx="4" fill="#fef3c7" stroke="#d97706"/><text x="451" y="350" text-anchor="middle">w</text>
  </g>

  <!-- activation tracks -->
  <line x1="150" y1="190" x2="250" y2="190" stroke="#dbeafe" stroke-width="2"/>
  <line x1="150" y1="280" x2="250" y2="280" stroke="#dbeafe" stroke-width="2"/>
  <line x1="150" y1="370" x2="250" y2="370" stroke="#dbeafe" stroke-width="2"/>

  <!-- activation dots flowing left -> right across the grid, turning green as they compute -->
  <circle r="9" cy="190" fill="#3b82f6"><animate attributeName="cx" from="160" to="530" dur="3.4s" begin="0s" repeatCount="indefinite"/><animate attributeName="fill" values="#3b82f6;#3b82f6;#22c55e" keyTimes="0;0.7;1" dur="3.4s" begin="0s" repeatCount="indefinite"/></circle>
  <circle r="9" cy="280" fill="#3b82f6"><animate attributeName="cx" from="160" to="530" dur="3.4s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="fill" values="#3b82f6;#3b82f6;#22c55e" keyTimes="0;0.7;1" dur="3.4s" begin="0.3s" repeatCount="indefinite"/></circle>
  <circle r="9" cy="370" fill="#3b82f6"><animate attributeName="cx" from="160" to="530" dur="3.4s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="fill" values="#3b82f6;#3b82f6;#22c55e" keyTimes="0;0.7;1" dur="3.4s" begin="0.6s" repeatCount="indefinite"/></circle>

  <!-- OUT collector bar at bottom -->
  <rect x="250" y="426" width="260" height="28" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="380" y="445" font-size="12.5" font-weight="700" fill="#5b21b6" text-anchor="middle">results collected</text>

  <!-- sum dots dropping from columns into collector -->
  <circle r="7" cx="290" fill="#22c55e"><animate attributeName="cy" from="410" to="440" dur="0.9s" begin="3.0s;6.4s;9.8s" fill="freeze"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.8;1" dur="0.9s" begin="3.0s;6.4s;9.8s"/></circle>
  <circle r="7" cx="380" fill="#22c55e"><animate attributeName="cy" from="410" to="440" dur="0.9s" begin="3.2s;6.6s;10.0s" fill="freeze"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.8;1" dur="0.9s" begin="3.2s;6.6s;10.0s"/></circle>
  <circle r="7" cx="470" fill="#22c55e"><animate attributeName="cy" from="410" to="440" dur="0.9s" begin="3.4s;6.8s;10.2s" fill="freeze"/><animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.8;1" dur="0.9s" begin="3.4s;6.8s;10.2s"/></circle>

  <!-- side note -->
  <text x="560" y="250" font-size="12" fill="#475569">Each value</text>
  <text x="560" y="268" font-size="12" fill="#475569">that flows in</text>
  <text x="560" y="286" font-size="12" fill="#475569">is reused by</text>
  <text x="560" y="304" font-size="12" fill="#475569">every cell it</text>
  <text x="560" y="322" font-size="12" fill="#475569">passes, that</text>
  <text x="560" y="340" font-size="12" fill="#475569">reuse is the</text>
  <text x="560" y="358" font-size="12" fill="#475569">whole trick.</text>
</svg>
