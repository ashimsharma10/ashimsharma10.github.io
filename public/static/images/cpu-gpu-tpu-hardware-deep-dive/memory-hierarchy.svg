<svg width="100%" viewBox="0 0 860 450" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="GPU memory hierarchy with speed bars: registers fastest, then L1/shared, L2, HBM, and host RAM slowest">
  <defs>
    <marker id="memArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#0f172a" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="860" height="450" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="28" y="40" font-size="21" font-weight="700" fill="#0f172a">GPU memory: bigger as you go down, slower too</text>
  <text x="28" y="64" font-size="14" fill="#64748b">Bar length = how fast that level can feed the cores. Keep data high and reuse it.</text>

  <!-- speed axis -->
  <line x1="210" y1="88" x2="640" y2="88" stroke="#0f172a" stroke-width="1.6" marker-end="url(#memArrow)"/>
  <text x="210" y="82" font-size="12" font-weight="600" fill="#334155">speed (how fast it feeds the cores) →</text>

  <!-- rows -->
  <!-- Registers -->
  <rect x="28" y="106" width="170" height="44" rx="9" fill="#16a34a"/>
  <text x="113" y="133" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Registers</text>
  <rect x="210" y="112" width="430" height="32" rx="7" fill="#86efac" stroke="#16a34a"/>
  <text x="224" y="133" font-size="12" font-weight="700" fill="#14532d">fastest</text>
  <text x="656" y="131" font-size="12.5" fill="#475569">values in use right now</text>

  <!-- L1 / shared -->
  <rect x="28" y="166" width="170" height="44" rx="9" fill="#0891b2"/>
  <text x="113" y="193" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">L1 / Shared</text>
  <rect x="210" y="172" width="350" height="32" rx="7" fill="#a5f3fc" stroke="#0891b2"/>
  <text x="224" y="193" font-size="12" font-weight="700" fill="#155e75">very fast</text>
  <text x="656" y="191" font-size="12.5" fill="#475569">tiles being reused</text>

  <!-- L2 -->
  <rect x="28" y="226" width="170" height="44" rx="9" fill="#2563eb"/>
  <text x="113" y="253" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">L2 cache</text>
  <rect x="210" y="232" width="250" height="32" rx="7" fill="#bfdbfe" stroke="#2563eb"/>
  <text x="224" y="253" font-size="12" font-weight="700" fill="#1e40af">fast</text>
  <text x="656" y="251" font-size="12.5" fill="#475569">recently used data</text>

  <!-- HBM -->
  <rect x="28" y="286" width="170" height="44" rx="9" fill="#7c3aed"/>
  <text x="113" y="307" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">HBM (VRAM)</text>
  <text x="113" y="323" font-size="10.5" fill="#ede9fe" text-anchor="middle">main GPU memory</text>
  <rect x="210" y="292" width="150" height="32" rx="7" fill="#ddd6fe" stroke="#7c3aed"/>
  <text x="224" y="313" font-size="12" font-weight="700" fill="#5b21b6">big, but slower</text>
  <text x="656" y="305" font-size="12.5" font-weight="700" fill="#5b21b6">the model lives here</text>
  <text x="656" y="322" font-size="12" fill="#475569">weights + activations</text>

  <!-- Host RAM -->
  <rect x="28" y="346" width="170" height="44" rx="9" fill="#64748b"/>
  <text x="113" y="373" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Host RAM</text>
  <rect x="210" y="352" width="64" height="32" rx="7" fill="#e2e8f0" stroke="#64748b"/>
  <text x="282" y="373" font-size="12" font-weight="700" fill="#475569">slow (over PCIe)</text>
  <text x="656" y="371" font-size="12.5" fill="#475569">dataset &amp; checkpoints</text>

  <text x="430" y="424" font-size="13" font-style="italic" fill="#94a3b8" text-anchor="middle">Each step down: roughly 10× more room, but about 10× less speed.</text>
</svg>
